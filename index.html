<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Snake</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="title">🐍 Snake</div>
      <div class="stats">
        <span>Score: <b id="score">0</b></span>
        <span>Best: <b id="best">0</b></span>
        <span>Level: <b id="level">1</b></span>
      </div>
      <div class="actions">
        <button id="pauseBtn" class="btn">Pause</button>
        <button id="restartBtn" class="btn btn-primary">Restart</button>
      </div>
    </header>

    <main class="wrap">
      <canvas id="game" width="400" height="400" aria-label="Snake game canvas"></canvas>

      <section class="help">
        <p><b>Desktop:</b> Arrow keys / WASD (press <b>L</b> to level up for testing)</p>
        <p><b>Mobile:</b> Swipe or use buttons</p>
      </section>

      <!-- Mobile controls -->
      <section class="pad" aria-label="Touch controls">
        <button class="pad-btn up" data-dir="up">▲</button>
        <button class="pad-btn left" data-dir="left">◀</button>
        <button class="pad-btn down" data-dir="down">▼</button>
        <button class="pad-btn right" data-dir="right">▶</button>
      </section>

      <div id="overlay" class="overlay hidden">
        <div class="card">
          <h2 id="overlayTitle">Game Over</h2>
          <p id="overlayMsg">Tap Restart to play again.</p>
          <div class="overlay-actions">
            <button id="overlayRestart" class="btn btn-primary">Restart</button>
          </div>
        </div>
      </div>

      <div id="levelToast" class="level-toast hidden" aria-live="polite">Level 1!</div>
    </main>

    <script src="game.js"></script>
  </body>
</html>
