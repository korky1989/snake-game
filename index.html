<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>My Games</title>
  <style>
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:#0b1220; color:#e9eefc;
    }
    .card{
      width:min(92vw,520px);
      background:#101a33;
      border-radius:16px;
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }
    h1{ margin:0 0 12px; font-size:22px; }
    a{
      display:block; padding:12px 14px; margin:10px 0;
      border-radius:12px; text-decoration:none; color:#e9eefc;
      border:1px solid rgba(255,255,255,0.15);
    }
    a:hover{ background:rgba(255,255,255,0.06); }
    .hint{ color:#a9b6d6; font-size:13px; margin-top:10px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>My Games</h1>
    <a href="./">🐍 Snake (home)</a>
    <a href="./pool/">🎱 8-Ball Pool</a>
    <div class="hint">
      If Snake is currently your root page, keep it there and use Option 1 instead.
      Option 2 is best if Snake lives in <code>/snake/</code>.
    </div>
  </div>
</body>
</html>
