<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
  />
  <title>8-Ball Pool</title>
  <link rel="stylesheet" href="pool.css" />
</head>
<body>
  <header class="topbar">
    <div class="left">
      <div class="title">8-Ball Pool</div>
      <div id="status" class="status">Loading…</div>
    </div>

    <div class="right">
      <label class="sr-only" for="mode">Game mode</label>
      <select id="mode" aria-label="Game mode">
        <option value="ai" selected>1 Player (vs AI)</option>
        <option value="local">2 Player (Local)</option>
      </select>

      <label class="sr-only" for="difficulty">AI difficulty</label>
      <select id="difficulty" aria-label="AI difficulty">
        <option value="easy">AI: Easy</option>
        <option value="medium" selected>AI: Medium</option>
        <option value="hard">AI: Hard</option>
      </select>

      <button id="newGame" type="button">New Game</button>
    </div>
  </header>

  <main class="wrap">
    <canvas id="c" aria-label="8-ball pool table"></canvas>

    <div class="hud">
      <div><b>Player 1</b> group: <span id="p1group">—</span></div>
      <div><b><span id="p2label">AI</span></b> group: <span id="p2group">—</span></div>
      <div><b>Turn</b>: <span id="turn">—</span></div>
      <div><b>Ball-in-hand</b>: <span id="bih">no</span></div>
    </div>
  </main>

  <script src="pool.js"></script>
</body>
</html>
